# @quoin/prim-switcher — Cargo-style manifest (D.85, draft format)

[package]
name = "@quoin/prim-switcher"
version = "1.0.0"
type = "primitive"
quoin-version = "^0.1.0"
description = "Layout primitive — row that switches to column below container threshold. See quoin.pack.json for canonical schema."
category = "layout"

[dependencies]
"@quoin/tokens-baseline" = "^0.1.0"

[anatomy]
mandatory-slots = ["switcher-container"]
data-pattern-prefix = "switcher"
container-query-required = true
container-type-note = "switcher-container declares container-type: inline-size. v3.G.11 container-query convention."

[anatomy.attributes-universal.data-threshold]
values = ["narrow", "standard", "wide"]
default = "standard"
note = "Container-width threshold below which the row stacks. narrow=30em, standard=40em, wide=60em."

[anatomy.attributes-universal.data-gap]
values = ["xs", "sm", "md", "lg"]
default = "md"
note = "Maps to --space-2 / --space-3 / --space-card / --space-section."

[anatomy.attributes-universal.data-align]
values = ["start", "center", "end", "stretch"]
default = "stretch"
note = "Cross-axis alignment (align-items in row mode)."
